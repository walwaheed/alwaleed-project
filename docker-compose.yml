services:
  alwaleed-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build arguments for Vite (frontend build time)
        # These are automatically read from .env file
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    
    image: alwaleed-backend:latest
    container_name: alwaleed-app
    
    # Runtime environment variables (backend)
    # These are loaded from .env at container startup
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - CLOUD_PRINTER_KEY=${CLOUD_PRINTER_KEY}
      - PAYLINK_SECRET_KEY=${PAYLINK_SECRET_KEY}
      - PAYLINK_APP_ID=${PAYLINK_APP_ID}
      - PAYLINK_TEST_MODE=${PAYLINK_TEST_MODE:-false}
    
    ports:
      - "3000:3000"
    
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"