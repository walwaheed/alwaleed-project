services:
  # Backend API (Development Mode)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: alwaleed-backend-local
    restart: unless-stopped
    ports:
      - "5000:5000"  # Directly expose backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      # Mount source code for hot reload
      - ./server:/app/server
      - ./package.json:/app/package.json
      # Use named volume for node_modules to avoid Windows/Linux conflicts
      - backend-node-modules:/app/node_modules
      - backend-uploads:/app/uploads
    networks:
      - alwaleed-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Development Mode with Vite Dev Server)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: alwaleed-frontend-local
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vite default port
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      # Use named volume for node_modules to avoid Windows/Linux conflicts
      - frontend-node-modules:/app/node_modules
    networks:
      - alwaleed-network
    depends_on:
      - backend

networks:
  alwaleed-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-node-modules:
  frontend-node-modules:
